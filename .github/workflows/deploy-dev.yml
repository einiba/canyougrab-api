name: Deploy to Dev

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev.canyougrab.it
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            REF=dev
            REPO_DIR=/opt/canyougrab-repo

            cd "$REPO_DIR"
            git fetch origin
            git checkout "$REF"
            git pull origin "$REF" 2>/dev/null || true

            bash "$REPO_DIR/scripts/deploy-host.sh"
