name: Build & Push Prod Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'mcp-server/**'
      - 'portal/**'
      - 'shared/**'
      - 'scripts/**'
      - 'cmd/**'
      - 'go.mod'
      - 'Dockerfile'
      - 'portal/Dockerfile'
      - '.github/workflows/docker-build-prod.yml'
  workflow_dispatch:

env:
  REGISTRY: registry.digitalocean.com/canyougrab

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN_PROD }}

      - name: Login to DOCR
        run: |
          doctl registry login --expiry-seconds 600
          docker logout registry-1.docker.io || true

      - name: Build and push API image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker pull $REGISTRY/api:prod-latest || true
          docker build \
            --cache-from $REGISTRY/api:prod-latest \
            -t $REGISTRY/api:prod-$SHA \
            -t $REGISTRY/api:prod-latest \
            .
          docker push $REGISTRY/api:prod-$SHA
          docker push $REGISTRY/api:prod-latest

  build-portal:
    name: Build Portal Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Re-vendor shared name-generator at pinned SHA (best-effort)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.SHARED_SYNC_TOKEN }}
        run: |
          cd portal
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "SHARED_SYNC_TOKEN not set — skipping re-vendor; using committed copy."
            echo "Set the SHARED_SYNC_TOKEN repo secret to a fine-grained PAT with"
            echo "Contents:read on einiba/canyougrab-site to enable automatic re-vendor."
            exit 0
          fi
          echo "Re-vendoring portal/src/shared from canyougrab-site@$(cat scripts/.shared-source-sha)"
          node scripts/sync-shared.mjs

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN_PROD }}

      - name: Login to DOCR
        run: |
          doctl registry login --expiry-seconds 600
          docker logout registry-1.docker.io || true

      - name: Build and push portal image
        run: |
          SHA=$(git rev-parse --short HEAD)
          docker pull $REGISTRY/portal:prod-latest || true
          docker build \
            --cache-from $REGISTRY/portal:prod-latest \
            -f portal/Dockerfile \
            -t $REGISTRY/portal:prod-$SHA \
            -t $REGISTRY/portal:prod-latest \
            .
          docker push $REGISTRY/portal:prod-$SHA
          docker push $REGISTRY/portal:prod-latest
