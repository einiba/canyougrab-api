name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to api.canyougrab.it
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            REF=${{ github.ref_name }}
            REPO_DIR=/opt/canyougrab-repo

            cd "$REPO_DIR"
            git fetch origin
            git checkout "$REF"
            git pull origin "$REF" 2>/dev/null || true

            bash "$REPO_DIR/scripts/deploy-host.sh"
