# Nginx reverse proxy for Grafana.
# Include this in your existing server block or create a new one.
#
# Option A: Subdomain (grafana.canyougrab.it)
#   - Add a DNS A record for grafana.canyougrab.it → droplet IP
#   - Create /etc/nginx/sites-available/grafana.conf with this content
#   - ln -s /etc/nginx/sites-available/grafana.conf /etc/nginx/sites-enabled/
#
# Option B: Path-based (api.canyougrab.it/grafana)
#   - Add the location block to your existing api.canyougrab.it server config
#   - Uncomment the [root_url] line in /etc/grafana/grafana.ini:
#     [server]
#     root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana/

# --- Option A: Subdomain ---
server {
    listen 443 ssl http2;
    server_name grafana.canyougrab.it;

    # Reuse your existing Cloudflare Origin cert or Let's Encrypt cert
    ssl_certificate     /etc/ssl/canyougrab/fullchain.pem;
    ssl_certificate_key /etc/ssl/canyougrab/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for Grafana Live
    location /api/live/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

