# dev-api.canyougrab.it — API reverse proxy
# Deployed to /etc/nginx/sites-enabled/ on dev-api hosts.
# SSL via Let's Encrypt (certbot) or Cloudflare Origin cert.

server {
    listen 80;
    server_name dev-api.canyougrab.it;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dev-api.canyougrab.it;

    ssl_certificate /etc/ssl/cloudflare-origin-cert.pem;
    ssl_certificate_key /etc/ssl/cloudflare-origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # MCP server (SSE streaming — no buffering)
    location /mcp {
        # CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, content-type, accept, mcp-session-id' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Headers' 'authorization, content-type, accept, mcp-session-id' always;
        add_header 'Access-Control-Expose-Headers' 'mcp-session-id' always;

        proxy_pass http://127.0.0.1:8001/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_buffering off;
        proxy_cache off;
    }

    # API (FastAPI/Uvicorn)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
