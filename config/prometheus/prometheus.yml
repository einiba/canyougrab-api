global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - 'alert-rules.yml'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: redis_exporter
    static_configs:
      - targets: ['localhost:9121']

  - job_name: rq_metrics
    honor_labels: true
    static_configs:
      - targets: ['localhost:9122']

  - job_name: node_exporter_static
    static_configs:
      - targets: ['10.108.0.5:9100']
        labels:
          instance: unbound.canyougrab.internal
      - targets: ['10.108.0.8:9100']
        labels:
          instance: rust-whois.canyougrab.internal
