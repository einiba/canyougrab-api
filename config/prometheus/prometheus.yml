global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - 'alert-rules.yml'

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: redis_exporter
    static_configs:
      - targets: ['localhost:9121']

  - job_name: rq_metrics
    static_configs:
      - targets: ['localhost:9122']
