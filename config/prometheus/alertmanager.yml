# NOTE: Replace SLACK_WEBHOOK_URL_HERE with your actual Slack incoming webhook URL
# before deploying. Alertmanager does not support env var substitution.
# Alternatively, run: envsubst < alertmanager.yml.tmpl > alertmanager.yml

global:
  resolve_timeout: 5m

route:
  receiver: slack-alerts
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: slack-alerts
    slack_configs:
      - api_url: 'SLACK_WEBHOOK_URL_HERE'
        channel: '#ops-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}FIRING{{ else }}RESOLVED{{ end }} {{ .CommonLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          {{ end }}
