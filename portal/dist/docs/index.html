<!doctype html>
<html lang="en" style="color-scheme: dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Reference - CanYouGrab</title>
    <meta name="description" content="CanYouGrab API Reference — OpenAPI documentation for domain availability checking" />
    <link rel="icon" type="image/svg+xml" href="/logo-dark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script type="module" src="https://cdn.zudoku.dev/latest/main.js" crossorigin></script>
    <link rel="stylesheet" href="https://cdn.zudoku.dev/latest/zudoku.css" crossorigin />
    <script src="/chatwoot-init.js" defer></script>
    <style>
      body { margin: 0; }
      .portal-header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: #0a0b0d;
      }
      .portal-header-inner {
        max-width: 72rem;
        margin: 0 auto;
        padding: 0 1rem;
        height: 3.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .portal-header a {
        text-decoration: none;
      }
      .portal-header img {
        height: 1.75rem;
      }
      .portal-nav {
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      .portal-nav a {
        padding: 0.375rem 0.75rem;
        font-size: 0.875rem;
        border-radius: 0.375rem;
        color: #8b8f98;
        font-family: "Outfit", sans-serif;
        transition: color 0.15s, background-color 0.15s;
      }
      .portal-nav a:hover {
        color: #e8eaed;
        background: #1a1d24;
      }
      .portal-nav a.active {
        color: #00d4aa;
        background: rgba(0, 212, 170, 0.1);
      }
    </style>
  </head>
  <body>
    <header class="portal-header">
      <div class="portal-header-inner">
        <div style="display: flex; align-items: center; gap: 2rem;">
          <a href="/">
            <img src="/logo-dark.svg" alt="CanYouGrab" />
          </a>
          <nav class="portal-nav">
            <a href="/pricing">Plans & Pricing</a>
            <a href="/docs/" class="active">API Reference</a>
          </nav>
        </div>
      </div>
    </header>
    <div id="zudoku-root"></div>
    <script>
      document.getElementById("zudoku-root")
        .setAttribute("data-api-url", window.location.origin + "/openapi.json");
    </script>
  </body>
</html>
